app:
  name: HarvestFlow
  version: 1.0.0

backend:
  host: 0.0.0.0
  port: 3000
  db_path: ./backend/db/harvestflow.db
  data_dir: ./backend/data

collector:
  watch_folders: []
  poll_interval: 60
  openclaw:
    agents_dir: "C:/Users/20211/.openclaw/agents"
    target_agents:
      - backend_dev
      - req_analyst
      - qa_ops
      - coord
    skip_cron_sessions: true
    min_message_count: 5

curator:
  default_enabled: true
  auto_approve_threshold: 4

export:
  default_format: sharegpt
  output_dir: ./backend/data/export

plugins:
  dir: ./plugins
