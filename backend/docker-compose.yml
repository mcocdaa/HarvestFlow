services:
  backend:
    build: .
    container_name: harvestflow-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./:/app
      - ./data:/app/data
      - ../plugins:/app/plugins
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - API_VERSION=${API_VERSION:-v1}
    networks:
      - harvestflow-network

networks:
  harvestflow-network:
    driver: bridge
