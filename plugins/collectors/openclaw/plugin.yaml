name: openclaw
type: collector
version: 1.0.0
description: OpenClaw Agent session collector - reads from local OpenClaw session files
author: HarvestFlow Team

# 密钥定义
secrets:
  - name: OPENCLAW_API_KEY
    description: OpenClaw API 密钥（如需要远程访问）
    level: optional
    default: ""

# 插件配置
config:
  backend_entry: backend.py
  agents_dir: "/app/data/test_sessions/agents"
  target_agents:
    - req_analyst
  skip_cron_sessions: true
  min_message_count: 1
