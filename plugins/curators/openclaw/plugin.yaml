name: openclaw
type: curator
version: 1.0.0
description: OpenClaw curator - AI-powered quality assessment
author: HarvestFlow Team

# 密钥定义
secrets:
  - name: OPENCLAW_LLM_API_KEY
    description: LLM API Key（用于智能审核）
    level: optional
    default: ""

# 插件配置
config:
  backend_entry: backend.py
  quality_threshold: 0.7
  use_ai_scoring: true
