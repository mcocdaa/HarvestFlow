# ============================================
# HarvestFlow 仅前端模式
# 使用: docker-compose -f docker-compose.frontend.yml -p harvestflow up
# 注意：需要已有后端服务运行
# ============================================

services:
  harvestflow-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: harvestflow-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_EXTERNAL_PORT:-8001}:8000"
    environment:
      - VITE_API_BASE_URL=http://harvestflow-backend:3000
    networks:
      - harvestflow-network
    depends_on:
      - harvestflow-backend

networks:
  harvestflow-network:
    name: harvestflow-network
